name: RustBeds
version: '${project.version}'
main: me.happy.rustbeds.RustBeds
api-version: '1.21.11'
load: STARTUP
authors: [HappySpleen]
description: A plugin that lets players choose which saved respawn point to use.
website: https://github.com/HappySpleen
permissions:
  rustbeds.skipcooldown:
    description: Allows the player to skip the respawn point cooldown
    default: false
  rustbeds.maxcount.*:
    description: Allows custom max saved respawn point counts (ignores the config)
    default: false
  rustbeds.admin:
    description: Allows administrators to manage other players' saved respawn points and reload the plugin configuration
    default: op
  multiplebedspawn.skipcooldown:
    description: Legacy alias for rustbeds.skipcooldown
    default: false
  multiplebedspawn.maxcount.*:
    description: Legacy alias for rustbeds.maxcount.*
    default: false
  multiplebedspawn.admin:
    description: Legacy alias for rustbeds.admin
    default: op
